<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Worker Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="stats-sidebar">
            <h1 class="game-title">TETRIS</h1>
    
            <div class="card">
                <div class="label">HIGH SCORE</div>
                <div id="highScore" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">SCORE</div>
                <div id="score" class="value">0</div>
            </div>

            <div class="card next-card">
                <div class="label">NEXT</div>
                <canvas id="next" width="80" height="80"></canvas>
            </div>

            <div class="controls-panel">
                <div class="music-row">
                    <button id="mute-btn" title="Toggle Mute">🔇</button>
                    <button id="next-track-btn" title="Next Track">⏭️</button>
                </div>
                <button id="pause-btn">PAUSE GAME</button>
            </div>              
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
