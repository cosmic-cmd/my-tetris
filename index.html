<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Worker Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <h1 style="margin: 0 0 10px 0; color: #00eeff;">TETRIS</h1>
    
            <div class="score-row">
                <div>
                    <div class="label" style="font-size: 0.7rem;">HIGH</div>
                    <div id="highScore" style="font-size: 1.2rem;">0</div>
                </div>
        <div>
            <div class="label" style="font-size: 0.7rem;">SCORE</div>
            <div id="score" style="font-size: 1.2rem;">0</div>
        </div>
    </div>
            <div class="label">Next</div>
            <canvas id="next" width="80" height="80"></canvas>
            <div class="label">High Score</div>
            <div id="highScore">0</div>
            <div class="label">Score</div>
            <div id="score">0</div>
            <div class="music-grid">
                <button id="mute-btn">🔇 Mute</button>
                <button id="next-track-btn">⏭️ Next</button>
                <button id="pause-btn">⏸️ Pause</button>
            </div>            
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
