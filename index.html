<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Worker Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="start-screen" class="overlay">
            <h1 class="game-title">TETRIS</h1>
            <div class="high-score-display">HIGH SCORE: <span id="overlay-highScore">0</span></div>
            
            <div class="instructions">
                <p>⬅️ ➡️ : MOVE</p>
                <p>⬇️ : SOFT DROP</p>
                <p>SPACE : HARD DROP</p>
                <p>Q / W : ROTATE</p>
                <p>P : PAUSE</p>
                <p>SHIFT : HOLD</p>
            </div>
            
            <button id="start-btn">START MISSION</button>
        </div>

        <div class="stats-sidebar">
            <h1 class="game-title">TETRIS</h1>
    
            <div class="card">
                <div class="label">HIGH SCORE</div>
                <div id="highScore" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">SCORE</div>
                <div id="score" class="value">0</div>
            </div>

            <div class="preview-section">
                <div class="card preview-card">
                    <div class="label">HOLD (⇧)</div>
                    <canvas id="hold" width="80" height="80"></canvas>
                </div>
                <div class="card preview-card">
                    <div class="label">NEXT</div>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
            </div>
            
            <div class="controls-panel">
                <div class="button-row">
                    <button id="mute-btn">🔇 MUTE</button>
                    <button id="next-track-btn">⏭️ NEXT</button>
                </div>
                <button id="pause-btn">PAUSE GAME</button>
            </div>              
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
