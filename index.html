<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Worker Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <h1 style="color: #00eeff; margin: 0;">TETRIS</h1>
    
            <div class="score-row" style="display: flex; gap: 20px; text-align: center;">
                <div>
                    <div style="font-size: 0.7rem; color: #888;">HIGH</div>
                    <div id="highScore" style="font-size: 1.2rem;">140</div>
                </div>
                <div>
                    <div style="font-size: 0.7rem; color: #888;">SCORE</div>
                    <div id="score" style="font-size: 1.2rem;">0</div>
                </div>
            </div>

            <div style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">NEXT</div>
            <canvas id="next" width="80" height="80"></canvas>

            <div class="music-grid" style="display: flex; flex-direction: column; gap: 5px; width: 100%; margin-top: 15px;">
                <div style="display: flex; gap: 5px;">
                    <button id="mute-btn" style="flex: 1;">🔇 Mute</button>
                    <button id="next-track-btn" style="flex: 1;">⏭️ Next</button>
                </div>
                <button id="pause-btn">⏸️ Pause</button>
            </div>              
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
