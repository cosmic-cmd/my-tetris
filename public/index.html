<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Worker Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="start-screen">
            <h1>TETRIS V2</h1>
    
            <div class="leaderboard-section">
                <h2>TOP 5 AGENTS</h2>
                <ul id="leaderboard-list" style="list-style: none; padding: 0;">
                    <li class="score-item">INITIALIZING...</li>
                </ul>
            </div>

            <div class="input-group">
                <input type="text" id="player-name-input" placeholder="AGENT ID" maxlength="10">
                <button id="start-btn">START MISSION</button>
            </div>
        </div>
        

        <div class="stats-sidebar">
            <h1 class="game-title">TETRIS</h1>
    
            <div class="card">
                <div class="label">HIGH SCORE</div>
                <div id="highScore" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">SCORE</div>
                <div id="score" class="value">0</div>
            </div>
            
            <div class="card combo-card">
                <div class="label">COMBO STREAK</div>
                <div id="combo-value" class="value">X0</div>
            </div>

            <div class="preview-section">
                <div class="card preview-card">
                    <div class="label">HOLD (⇧)</div>
                    <canvas id="hold" width="80" height="80"></canvas>
                </div>
                <div class="card preview-card">
                    <div class="label">NEXT</div>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
            </div>
            
            <div class="controls-panel">
                <div class="button-row">
                    <button id="mute-btn">🔇 MUTE</button>
                    <button id="next-track-btn">⏭️ NEXT</button>
                </div>
                <button id="pause-btn">PAUSE GAME</button>
            </div>              
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
